spring.application.name: catalog-service
server.port: 8081
server.shutdown: graceful
spring.mvc.problemdetails.enabled: true

######## Catalog Service Configuration  #########
catalog.page-size: 10

######## Actuator Configuration  #########
management.info.git.mode: full
management.endpoints.web.exposure.include: *
management.endpoint.health.show-details: always
management.endpoint.health.probes.enabled: true
management.metrics.tags.application: ${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests: true
management.observations.key-values.application: ${spring.application.name}
management.tracing.enabled: false
management.tracing.sampling.probability: 1.0
management.zipkin.tracing.endpoint: http://localhost:9411/api/v2/spans

######## Swagger Configuration  #########
swagger.api-gateway-url: http://localhost:8989/catalog

######## Database Configuration  #########
spring.datasource.url: jdbc:postgresql://localhost:15432/postgres
spring.datasource.username: postgres
spring.datasource.password: postgres
spring.jpa.open-in-view: false


---
spring.config.activate.on-profile: docker

management.tracing.enabled: true
management.zipkin.tracing.endpoint: http://tempo:9411/api/v2/spans
spring.datasource.url: jdbc:postgresql://catalog-db:5432/postgres
swagger.api-gateway-url: http://api-gateway:8989/catalog
